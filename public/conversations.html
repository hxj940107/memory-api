<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天记录</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

.container{
    width:100%;
    max-width:800px;
    margin:30px auto;
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,.08);
}

.header{
    padding:20px;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid #eee;
}

.item{
    padding:18px 20px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.item:hover{
    background:#f8f8f8;
}

.title{
    font-size:16px;
    font-weight:600;
}

.time{
    margin-top:6px;
    color:#888;
    font-size:13px;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
聊天记录
</div>

<div id="list"></div>

</div>

<script>

const USER_ID="small_c";

async function load(){

    const res=await fetch(
        "https://memory-api-beta.vercel.app/api/conversations?user_id="+USER_ID
    );

    const data=await res.json();

    const list=document.getElementById("list");

    data.forEach(item=>{

        const div=document.createElement("div");

        div.className="item";

        div.innerHTML=`
            <div class="title">${item.title}</div>
            <div class="time">${item.created_at}</div>
        `;

        div.onclick=()=>{
            window.location.href="/";
        };

        list.appendChild(div);

    });

}

load();

</script>

</body>
</html>
