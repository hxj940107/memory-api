<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory Chat</title>

<link rel="stylesheet" href="/chat.css">

</head>

<body>

<div class="app">

<div class="sidebar">
<div class="logo">🧠 AI Chat</div>

<div class="new-chat" onclick="startNewChat()">
+ 新对话
</div>

<div id="conversation-list" class="conversation-list"></div>
</div>

<div class="main">

<div class="header">
AI Memory Chat
</div>

<div id="chat" class="chat"></div>

<div class="bottom">
<input id="input"
placeholder="输入消息..."
onkeydown="if(event.key==='Enter')sendMessage()">

<button onclick="sendMessage()">发送</button>
</div>

</div>

</div>

<script>

const API_CHAT="/api/chat";
const API_HISTORY="/api/history";
const API_CONVERSATIONS="/api/conversations";

const API_USER_STATE="/api/user-state";

const USER_ID="small_c";

let CONVERSATION_ID =
localStorage.getItem("last_conversation");

let historyOffset = 0;
const PAGE_SIZE = 50;
let hasMoreHistory = true;

const chat=document.getElementById("chat");
const list=document.getElementById("conversation-list");
const input=document.getElementById("input");

function addMessage(role,text){

    const row=document.createElement("div");
    row.className="message "+role;

    const bubble=document.createElement("div");
    bubble.className="bubble";
    bubble.textContent=text;

    row.appendChild(bubble);
    chat.appendChild(row);

    chat.scrollTop=chat.scrollHeight;

    return bubble;

}

function startNewChat(){

    CONVERSATION_ID="chat_"+Date.now();

    localStorage.setItem(
        "last_conversation",
        CONVERSATION_ID
    );

    chat.innerHTML="";

}

async function loadHistory(reset = true){

    if(!CONVERSATION_ID) return;

    if(reset){

        historyOffset = 0;
        hasMoreHistory = true;
        chat.innerHTML = "";

    }

    if(!hasMoreHistory) return;

    const res = await fetch(

        API_HISTORY +
        "?user_id=" + USER_ID +
        "&conversation_id=" + CONVERSATION_ID +
        "&limit=" + PAGE_SIZE +
        "&offset=" + historyOffset

    );

    const data = await res.json();

    if(data.length < PAGE_SIZE){

        hasMoreHistory = false;

    }

    if(reset){

        data.forEach(item=>{

            addMessage(
                item.role==="user" ? "user":"ai",
                item.content
            );

        });

    }else{

        const oldHeight = chat.scrollHeight;

        data.forEach(item=>{

            const row=document.createElement("div");
            row.className="message "+(item.role==="user"?"user":"ai");

            const bubble=document.createElement("div");
            bubble.className="bubble";
            bubble.textContent=item.content;

            row.appendChild(bubble);

            chat.insertBefore(row,chat.firstChild);

        });

        chat.scrollTop =
            chat.scrollHeight-oldHeight;

    }

    historyOffset += data.length;

}

async function loadConversations(){

    const res=await fetch(
        API_CONVERSATIONS+
        "?user_id="+USER_ID
    );

    const data=await res.json();

    list.innerHTML="";

    data.forEach(item=>{

        const div=document.createElement("div");

        div.className="conversation";

        div.textContent=item.title;

      div.onclick=()=>{

    CONVERSATION_ID=item.id;

    localStorage.setItem(
        "last_conversation",
        CONVERSATION_ID
    );

    loadHistory();

};

        list.appendChild(div);

    });

}

async function sendMessage(){

    const text=input.value.trim();

    if(!text) return;

    if(!CONVERSATION_ID){

    CONVERSATION_ID="chat_"+Date.now();

    localStorage.setItem(
        "last_conversation",
        CONVERSATION_ID
    );

}
    addMessage("user",text);

    input.value="";

    const loading=addMessage("ai","正在思考...");

    const res=await fetch(API_CHAT,{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            user_id:USER_ID,

            conversation_id:CONVERSATION_ID,

            message:text

        })

    });

    const data=await res.json();

    loading.textContent=data.reply||"无回复";

    await loadConversations();

}

(async ()=>{

    try{

        const res=await fetch(
            API_USER_STATE+"?user_id="+USER_ID
        );

        if(res.ok){

            const state=await res.json();

            if(state.last_conversation){

                CONVERSATION_ID=state.last_conversation;

                localStorage.setItem(
                    "last_conversation",
                    CONVERSATION_ID
                );

            }

        }

    }catch(e){}

    await loadConversations();

    if(CONVERSATION_ID){

        await loadHistory();

    }

})();

chat.addEventListener("scroll", async ()=>{

    if(chat.scrollTop < 30 && hasMoreHistory){

        await loadHistory(false);

    }

});

</script>

</body>
</html>
