<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory Chat</title>

<style>
*{box-sizing:border-box;}
body{
    margin:0;
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}
.container{
    width:100%;
    max-width:900px;
    margin:30px auto;
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,.08);
}
.header{
    padding:18px 24px;
    font-size:20px;
    font-weight:700;
    border-bottom:1px solid #eee;
}
#chat{
    height:600px;
    overflow-y:auto;
    padding:25px;
    background:#fafafa;
}
.message{
    display:flex;
    margin-bottom:18px;
}
.message.user{justify-content:flex-end;}
.message.ai{justify-content:flex-start;}
.bubble{
    max-width:75%;
    padding:14px 18px;
    border-radius:18px;
    line-height:1.6;
    white-space:pre-wrap;
}
.user .bubble{
    background:#0b57d0;
    color:white;
}
.ai .bubble{
    background:white;
    border:1px solid #ddd;
}
.bottom{
    display:flex;
    gap:10px;
    padding:18px;
    border-top:1px solid #eee;
}
input{
    flex:1;
    font-size:16px;
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
}
button{
    width:100px;
    border:none;
    border-radius:12px;
    background:#0b57d0;
    color:white;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="header">🧠 AI Memory Chat</div>

<div id="chat"></div>

<div class="bottom">
<input id="input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
<button onclick="sendMessage()">发送</button>
</div>

</div>

<script>

const API_CHAT = "https://memory-api-beta.vercel.app/api/chat";
const API_HISTORY = "https://memory-api-beta.vercel.app/api/history";
const USER_ID = "small_c";

const chat = document.getElementById("chat");

// 渲染消息
function render(role, text){
    const row = document.createElement("div");
    row.className = "message " + role;

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    bubble.innerText = (role === "user" ? "你: " : "AI: ") + text;

    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;
}

// 加载云端历史
async function loadHistory(){
    try{
        const res = await fetch(API_HISTORY + "?user_id=" + USER_ID);
        const data = await res.json();

        data.forEach(item=>{
            render(item.metadata?.role || "ai", item.content);
        });

    }catch(e){
        console.log("history load error", e);
    }
}

// 发送消息
async function sendMessage(){

    const input = document.getElementById("input");
    const text = input.value.trim();
    if(!text) return;

    render("user", text);
    input.value = "";

    render("ai", "正在思考...");

    try{

        const res = await fetch(API_CHAT,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                user_id:USER_ID,
                message:text
            })
        });

        const data = await res.json();

        render("ai", data.reply || "无回复");

    }catch(e){
        render("ai", "错误：" + e.message);
    }
}

// 初始化
loadHistory();

</script>

</body>
</html>
