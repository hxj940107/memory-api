<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>AI Memory Chat</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
    }
    #chat {
      border: 1px solid #ddd;
      padding: 10px;
      height: 420px;
      overflow-y: auto;
      margin-bottom: 10px;
      background: #fafafa;
    }
    .msg {
      margin: 6px 0;
      padding: 6px;
    }
    .user {
      color: #1a73e8;
    }
    .ai {
      color: #188038;
    }
  </style>
</head>

<body>

  <h2>🧠 AI Memory Chat</h2>

  <div id="chat"></div>

  <input id="input" placeholder="输入消息..." style="width: 75%;" />
  <button onclick="sendMessage()">发送</button>

  <script>
    const API_URL = "https://memory-api-beta.vercel.app/api/chat";
    const user_id = "small_c";

    function addMsg(role, text) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerText = (role === "user" ? "你: " : "AI: ") + text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;

      addMsg("user", text);
      input.value = "";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user_id: user_id,
            message: text
          })
        });

        const data = await res.json();

        addMsg("ai", data.reply || "没有回复");

      } catch (err) {
        addMsg("ai", "错误: " + err.message);
      }
    }
  </script>

</body>
</html>
