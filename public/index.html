<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory Chat</title>

<link rel="stylesheet" href="/chat.css">

<style>
body{
    margin:0;
}
</style>

</head>

<body>

<div class="app">

    <!-- 左侧会话 -->
    <div class="sidebar">
        <div class="logo">🧠 AI Chat</div>

        <div class="new-chat" onclick="location.reload()">
            + 新对话
        </div>

        <div id="conversation-list" class="conversation-list"></div>
    </div>

    <!-- 主聊天 -->
    <div class="main">

        <div class="header">
            AI Memory Chat
        </div>

        <div id="chat" class="chat"></div>

        <div class="bottom">
            <input id="input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">发送</button>
        </div>

    </div>

</div>

<script>

const API_CHAT="https://memory-api-beta.vercel.app/api/chat";
const API_HISTORY="https://memory-api-beta.vercel.app/api/history";
const API_CONVERSATIONS="https://memory-api-beta.vercel.app/api/conversations";

const USER_ID="small_c";

const chat=document.getElementById("chat");
const list=document.getElementById("conversation-list");
const input=document.getElementById("input");

let currentAssistantBubble=null;

// ===== UI =====

function addMessage(role,text){

    const row=document.createElement("div");
    row.className="message "+role;

    const bubble=document.createElement("div");
    bubble.className="bubble";

    bubble.textContent=text;

    row.appendChild(bubble);
    chat.appendChild(row);

    chat.scrollTop=chat.scrollHeight;

    return bubble;
}

// ===== 历史 =====

async function loadHistory(){

    chat.innerHTML="";

    const res=await fetch(API_HISTORY+"?user_id="+USER_ID);
    const data=await res.json();

    data.forEach(m=>{
        const role=m.metadata?.role || "ai";
        addMessage(role==="user"?"user":"ai",m.content);
    });
}

// ===== 会话列表 =====

async function loadConversations(){

    const res=await fetch(API_CONVERSATIONS+"?user_id="+USER_ID);
    const data=await res.json();

    list.innerHTML="";

    data.forEach(c=>{

        const div=document.createElement("div");
        div.className="conversation";
        div.textContent=c.title;

        div.onclick=()=>{
            loadHistory();
        };

        list.appendChild(div);
    });
}

// ===== 发送 =====

async function sendMessage(){

    const text=input.value.trim();
    if(!text) return;

    addMessage("user",text);
    input.value="";

    currentAssistantBubble=addMessage("ai","正在思考...");

    const res=await fetch(API_CHAT,{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            user_id:USER_ID,
            message:text
        })
    });

    const data=await res.json();

    currentAssistantBubble.textContent=data.reply || "无回复";
}

// ===== init =====

loadHistory();
loadConversations();

</script>

</body>
</html>
