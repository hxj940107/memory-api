<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory Chat</title>
<link rel="stylesheet" href="/chat.css">
</head>
<body>
<div class="app">
<div class="sidebar">
<div class="logo">🧠 AI Chat</div>
<div class="new-chat" onclick="location.reload()">+ 新对话</div>
<div id="conversation-list" class="conversation-list"></div>
</div>
<div class="main">
<div class="header">AI Memory Chat</div>
<div id="chat" class="chat"></div>
<div class="bottom">
<input id="input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMessage()">
<button onclick="sendMessage()">发送</button>
</div>
</div>
</div>
<script>
const API_CHAT="/api/chat";
const API_HISTORY="/api/history";
const API_CONVERSATIONS="/api/conversations";
const USER_ID="small_c";
const CONVERSATION_ID="default";
const chat=document.getElementById("chat");
const list=document.getElementById("conversation-list");
const input=document.getElementById("input");

function addMessage(role,text){
 const row=document.createElement("div");
 row.className="message "+role;
 const bubble=document.createElement("div");
 bubble.className="bubble";
 bubble.textContent=text;
 row.appendChild(bubble);
 chat.appendChild(row);
 chat.scrollTop=chat.scrollHeight;
 return bubble;
}

async function loadHistory(){
 chat.innerHTML="";
 const res=await fetch(API_HISTORY+"?user_id="+USER_ID+"&conversation_id="+CONVERSATION_ID);
 const data=await res.json();
 data.forEach(m=>addMessage(m.role==="user"?"user":"ai",m.content));
 chat.scrollTop=chat.scrollHeight;
}

async function loadConversations(){
 const res=await fetch(API_CONVERSATIONS+"?user_id="+USER_ID);
 const data=await res.json();
 list.innerHTML="";
 data.forEach(c=>{
   const d=document.createElement("div");
   d.className="conversation";
   d.textContent=c.title;
   d.onclick=loadHistory;
   list.appendChild(d);
 });
}

async function sendMessage(){
 const text=input.value.trim();
 if(!text)return;
 addMessage("user",text);
 input.value="";
 const loading=addMessage("ai","正在思考...");
 const res=await fetch(API_CHAT,{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({user_id:USER_ID,conversation_id:CONVERSATION_ID,message:text})
 });
 const data=await res.json();
 loading.textContent=data.reply||"无回复";
}

loadHistory();
loadConversations();
</script>
</body>
</html>
