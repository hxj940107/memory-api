<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Memory Chat</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f5f5f5;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

.container{
    width:100%;
    max-width:900px;
    margin:30px auto;
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,.08);
}

.header{
    padding:18px 24px;
    font-size:20px;
    font-weight:700;
    border-bottom:1px solid #eee;
}

#chat{
    height:600px;
    overflow-y:auto;
    padding:25px;
    background:#fafafa;
}

.message{
    display:flex;
    margin-bottom:18px;
}

.message.user{
    justify-content:flex-end;
}

.message.ai{
    justify-content:flex-start;
}

.bubble{
    max-width:75%;
    padding:14px 18px;
    border-radius:18px;
    line-height:1.6;
    white-space:pre-wrap;
    word-break:break-word;
}

.user .bubble{
    background:#0b57d0;
    color:white;
}

.ai .bubble{
    background:white;
    border:1px solid #ddd;
}

.bottom{
    display:flex;
    gap:10px;
    padding:18px;
    border-top:1px solid #eee;
}

input{
    flex:1;
    font-size:16px;
    padding:14px;
    border-radius:12px;
    border:1px solid #ccc;
}

button{
    width:100px;
    border:none;
    border-radius:12px;
    background:#0b57d0;
    color:white;
    cursor:pointer;
    font-size:15px;
}

button:hover{
    opacity:.9;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
🧠 AI Memory Chat
</div>

<div id="chat"></div>

<div class="bottom">
<input
id="input"
placeholder="输入消息..."
onkeydown="if(event.key==='Enter')sendMessage()">
<button onclick="sendMessage()">发送</button>
</div>

</div>

<script>

const API="https://memory-api-beta.vercel.app/api/chat";
const USER_ID="small_c";

const STORAGE_KEY="chat_history";

const chat=document.getElementById("chat");

let history=[];

function saveHistory(){
    localStorage.setItem(STORAGE_KEY,JSON.stringify(history));
}

function loadHistory(){

    const saved=localStorage.getItem(STORAGE_KEY);

    if(!saved) return;

    history=JSON.parse(saved);

    history.forEach(item=>{
        renderBubble(item.role,item.text);
    });

}

function renderBubble(role,text,id=null){

    const row=document.createElement("div");
    row.className="message "+role;

    const bubble=document.createElement("div");
    bubble.className="bubble";

    if(id) bubble.id=id;

    bubble.textContent=text;

    row.appendChild(bubble);

    chat.appendChild(row);

    chat.scrollTop=chat.scrollHeight;

}

function addBubble(role,text){

    history.push({
        role,
        text
    });

    saveHistory();

    renderBubble(role,text);

}

async function sendMessage(){

    const input=document.getElementById("input");

    const message=input.value.trim();

    if(!message) return;

    addBubble("user",message);

    input.value="";

    renderBubble("ai","正在思考...","loading");

    try{

        const res=await fetch(API,{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                user_id:USER_ID,
                message
            })
        });

        const data=await res.json();

        document.getElementById("loading").textContent=data.reply;

        history.push({
            role:"ai",
            text:data.reply
        });

        saveHistory();

    }catch(err){

        document.getElementById("loading").textContent="发生错误："+err.message;

    }

}

loadHistory();

</script>

</body>
</html>
