<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>AI Memory Chat</title>
  <style>
    body {
      font-family: Arial;
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
    }
    #chat {
      border: 1px solid #ddd;
      padding: 10px;
      height: 400px;
      overflow-y: auto;
      margin-bottom: 10px;
    }
    .msg {
      margin: 10px 0;
    }
    .user { color: blue; }
    .ai { color: green; }
  </style>
</head>

<body>
  <h2>🧠 AI Memory Chat</h2>

  <div id="chat"></div>

  <input id="input" placeholder="输入消息..." style="width:80%">
  <button onclick="send()">发送</button>

  <script>
    const API = "https://memory-api-beta.vercel.app/api/chat";
    const user_id = "small_c";

    const chat = document.getElementById("chat");

    function addMsg(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerText = role + ": " + text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const input = document.getElementById("input");
      const message = input.value;
      input.value = "";

      addMsg("user", message);

      const res = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user_id,
          message
        })
      });

      const data = await res.json();

      addMsg("ai", data.reply);
    }
  </script>
</body>
</html>
